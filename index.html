<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProteinScope</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/arose/ngl@v2.0.0-dev.37/dist/ngl.js"></script>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
  header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; color: var(--accent); }
  .logo span { color: var(--text); }
  .tagline { font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }
  .search-section { margin-bottom: 48px; }
  .search-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .search-row { display: flex; gap: 12px; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 16px; padding: 14px 20px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-btn { background: var(--accent); color: var(--bg); border: none; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; padding: 14px 28px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .search-btn:hover { background: #33dcff; }
  .search-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .examples { margin-top: 10px; font-size: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .example-chip { display: inline-block; background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 3px 10px; margin: 4px 4px 0 0; cursor: pointer; font-size: 11px; transition: all 0.15s; }
  .example-chip:hover { background: var(--border); border-color: var(--accent); }
  .loading { display: none; text-align: center; padding: 60px 0; }
  .loading.active { display: block; }
  .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }
  .error-box { display: none; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); padding: 16px 20px; margin-bottom: 32px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--danger); }
  .error-box.active { display: block; }
  .results { display: none; }
  .results.active { display: block; }
  .protein-hero { background: var(--surface); border: 1px solid var(--border); padding: 28px 32px; margin-bottom: 28px; position: relative; overflow: hidden; }
  .protein-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .protein-hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
  .protein-name { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; }
  .protein-gene { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent); margin-bottom: 8px; }
  .protein-organism { font-size: 13px; color: var(--muted); font-style: italic; }
  .protein-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 10px; border: 1px solid; }
  .badge-blue { color: var(--accent); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.06); }
  .badge-green { color: var(--accent3); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); }
  .badge-amber { color: var(--accent4); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
  .accession-block { text-align: left; flex-shrink: 0; }
  .accession-id { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; color: var(--accent); }
  .accession-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .ext-links { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-start; flex-wrap: wrap; }
  .ext-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; transition: all 0.15s; }
  .ext-link:hover { color: var(--accent); border-color: var(--accent); }
  .protein-function { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 14px; line-height: 1.7; color: #94a3b8; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 20px; }
  .stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } .protein-hero-top { flex-direction: column; } }
  .panel { background: var(--surface); border: 1px solid var(--border); margin-bottom: 20px; }
  .panel-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .panel-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .panel-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; flex: 1; }
  .panel-source { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .panel-body { padding: 20px; }

  /* 3D Structure */
  .structure-layout { display: grid; grid-template-columns: 1fr 260px; }
  @media (max-width: 900px) { .structure-layout { grid-template-columns: 1fr; } }
  #nglViewport { width: 100%; height: 440px; background: #07090f; position: relative; overflow: hidden; }
  .ngl-placeholder { width: 100%; height: 440px; background: #07090f; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .pdb-sidebar { border-left: 1px solid var(--border); background: var(--surface2); display: flex; flex-direction: column; max-height: 440px; overflow-y: auto; }
  .pdb-sidebar::-webkit-scrollbar { width: 4px; }
  .pdb-sidebar::-webkit-scrollbar-thumb { background: var(--border); }
  .pdb-sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--surface2); z-index: 1; }
  .pdb-entry { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid rgba(30,45,69,0.5); cursor: pointer; transition: background 0.15s; }
  .pdb-entry:hover { background: rgba(0,212,255,0.05); }
  .pdb-entry.active { background: rgba(0,212,255,0.1); border-left: 2px solid var(--accent); }
  .pdb-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--accent); flex: 1; }
  .pdb-meta { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .pdb-dl-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 3px 7px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; white-space: nowrap; }
  .pdb-dl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .structure-controls { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; align-items: center; }
  .struct-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; transition: all 0.15s; }
  .struct-btn:hover { color: var(--accent); border-color: var(--accent); }
  .struct-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,212,255,0.08); }
  .struct-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-right: 4px; }
  .ngl-loading { position: absolute; inset: 0; background: rgba(7,9,15,0.85); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); z-index: 10; gap: 10px; }
  .mini-spin { width: 16px; height: 16px; border: 2px solid rgba(0,212,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .fasta-dl-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 7px 16px; cursor: pointer; transition: all 0.15s; margin-top: 12px; }
  .fasta-dl-btn:hover { background: rgba(0,212,255,0.15); }

  /* Network */
  .network-container { position: relative; background: #f0ede8; overflow: hidden; border-radius: 4px; }
  #netSvg { width: 100%; display: block; cursor: grab; }
  #netSvg:active { cursor: grabbing; }
  .network-controls { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 6px; }
  .net-btn { background: rgba(255,255,255,0.85); border: 1px solid #ccc; color: #555; font-size: 14px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; border-radius: 4px; font-weight: bold; }
  .net-btn:hover { color: #333; border-color: #888; background: #fff; }
  .net-tooltip { position: absolute; background: rgba(255,255,255,0.97); border: 1px solid #ccc; padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #333; pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 220px; z-index: 10; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .net-tooltip strong { color: #111; font-size: 12px; }
  .net-tooltip .tip-score { color: #666; margin-top: 3px; }
  .net-tooltip .tip-action { color: #4a7fb5; margin-top: 4px; font-size: 10px; }
  .network-legend { display: flex; gap: 16px; padding: 10px 16px; border-top: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); flex-wrap: wrap; background: var(--surface); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Domains / Pathways */
  .interpro-entry { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .interpro-entry:last-child { border-bottom: none; padding-bottom: 0; }
  .interpro-entry:first-child { padding-top: 0; }
  .entry-type { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border: 1px solid; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .entry-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .entry-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .pathway-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .pathway-item:last-child { border-bottom: none; }
  .pathway-item:first-child { padding-top: 0; }
  .pathway-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a78bfa; min-width: 90px; padding-top: 2px; flex-shrink: 0; }
  .pathway-name { font-size: 13px; line-height: 1.4; }

  /* Sequence */
  .sequence-box { background: var(--bg); border: 1px solid var(--border); padding: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.8; color: #64748b; max-height: 160px; overflow-y: auto; white-space: pre; }
  .sequence-box::-webkit-scrollbar { width: 4px; }
  .sequence-box::-webkit-scrollbar-thumb { background: var(--border); }
  .location-pill { display: inline-block; background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25); color: #a78bfa; font-size: 12px; padding: 5px 12px; margin: 4px 4px 0 0; font-family: 'IBM Plex Mono', monospace; }
  .disease-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .disease-item:last-child { border-bottom: none; }
  .disease-item:first-child { padding-top: 0; }
  .disease-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .disease-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .empty { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 24px 0; }

  /* IEEE citations */
  .fn-text { font-size: 14px; line-height: 1.8; color: #94a3b8; }
  .cite-ref { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.25); padding: 1px 5px; margin: 0 1px; cursor: pointer; vertical-align: super; line-height: 1; text-decoration: none; transition: background 0.15s; }
  .cite-ref:hover { background: rgba(0,212,255,0.18); }
  .references-block { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .ref-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .ref-item { display: flex; gap: 10px; margin-bottom: 8px; font-size: 12px; line-height: 1.5; color: #64748b; }
  .ref-num { font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 11px; flex-shrink: 0; min-width: 24px; }
  .ref-body { flex: 1; }
  .ref-body a { color: var(--accent); text-decoration: none; }
  .ref-body a:hover { text-decoration: underline; }
  /* CATH/SCOP */
  .struct-class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .struct-class-grid { grid-template-columns: 1fr; } }
  .struct-class-section { }
  .struct-class-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .struct-class-label span { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); padding: 2px 7px; font-size: 10px; }
  .cath-item { padding: 9px 12px; border: 1px solid var(--border); margin-bottom: 7px; background: var(--bg); }
  .cath-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent4); margin-bottom: 3px; }
  .cath-name { font-size: 12px; color: var(--text); margin-bottom: 2px; }
  .cath-hier { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .scop-item { padding: 9px 12px; border: 1px solid var(--border); margin-bottom: 7px; background: var(--bg); }
  .scop-fold { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a78bfa; margin-bottom: 3px; }
  .scop-name { font-size: 12px; color: var(--text); margin-bottom: 2px; }
  .scop-class { font-size: 11px; color: var(--muted); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .anim { animation: fadeUp 0.4s ease forwards; opacity: 0; }
  .anim:nth-child(1) { animation-delay: 0s; } .anim:nth-child(2) { animation-delay: 0.07s; }
  .anim:nth-child(3) { animation-delay: 0.14s; } .anim:nth-child(4) { animation-delay: 0.21s; }
  .anim:nth-child(5) { animation-delay: 0.28s; } .anim:nth-child(6) { animation-delay: 0.35s; }
  .anim:nth-child(7) { animation-delay: 0.42s; } .anim:nth-child(8) { animation-delay: 0.49s; }

  footer { border-top: 1px solid var(--border); padding: 24px 0; margin-top: 48px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  .picker { display: none; margin-bottom: 32px; }
  .picker.active { display: block; }
  .picker-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
  .picker-card { background: var(--surface); border: 1px solid var(--border); padding: 14px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .picker-card:hover { border-color: var(--accent); background: var(--surface2); }
  .picker-card-name { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 6px; }
  .picker-card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .picker-card-gene { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); }
  .picker-card-acc { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .picker-card-org { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 3px; }
  .picker-card-rev { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 6px; border: 1px solid rgba(16,185,129,0.4); color: #10b981; background: rgba(16,185,129,0.06); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Protein<span>Scope</span></div>
    <div class="tagline">// unified protein information dashboard</div>
  </header>

  <div class="search-section">
    <div class="search-label">// Accepts: UniProt Accession (P04637) · Gene Symbol (TP53) · PDB Code (1TUP) — case-insensitive</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Gene (TP53) · UniProt (P04637) · PDB (1TUP) — any case" autocomplete="off" spellcheck="false">
      <button class="search-btn" id="searchBtn">QUERY →</button>
    </div>
    <div class="examples">
      Try:
      <span class="example-chip" onclick="fillSearch('P04637')">TP53</span>
      <span class="example-chip" onclick="fillSearch('P38398')">BRCA1</span>
      <span class="example-chip" onclick="fillSearch('P00533')">EGFR</span>
      <span class="example-chip" onclick="fillSearch('Q6L8H1')">Q6L8H1</span>
      <span class="example-chip" onclick="fillSearch('P05067')">APP</span>
      <span class="example-chip" onclick="fillSearch('P60709')">ACTB</span>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">Querying...</div></div>
  <div class="results" id="results"></div>
  <div class="picker" id="picker"></div>

  <footer>
    Data: <a href="https://www.uniprot.org" target="_blank">UniProt</a> ·
    <a href="https://string-db.org" target="_blank">STRING</a> ·
    <a href="https://www.ebi.ac.uk/interpro" target="_blank">InterPro</a> ·
    <a href="https://reactome.org" target="_blank">Reactome</a> ·
    <a href="https://www.rcsb.org" target="_blank">RCSB PDB</a> ·
    <a href="https://www.ebi.ac.uk/pdbe/docs/sifts/" target="_blank">PDBe SIFTS</a> ·
    <a href="https://pubmed.ncbi.nlm.nih.gov" target="_blank">PubMed</a>
  </footer>
</div>

<script>
'use strict';
const UNI = 'https://rest.uniprot.org/uniprotkb';
const STR = 'https://string-db.org/api/json';
const IPR = 'https://www.ebi.ac.uk/interpro/api';

// ── Event binding ────────────────────────────────────────────────────────────
(function() {
  document.getElementById('searchBtn').addEventListener('click', doSearch);
  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });
})();

function fillSearch(v) { document.getElementById('searchInput').value = v; doSearch(); }

function setLoading(t) {
  document.getElementById('loadingText').textContent = t;
  document.getElementById('loading').classList.add('active');
}
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '// ERROR: ' + msg;
  el.classList.add('active');
  document.getElementById('loading').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('searchBtn').disabled = false;
}
function clearUI() {
  document.getElementById('errorBox').classList.remove('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('results').innerHTML = '';
  document.getElementById('picker').classList.remove('active');
  document.getElementById('picker').innerHTML = '';
  if (window._nglStage) { window._nglStage.dispose(); window._nglStage = null; }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  clearUI();
  setLoading('Resolving protein...');
  document.getElementById('searchBtn').disabled = true;
  try {
    // Trigger disambiguation for any query that isn't a known accession or PDB code
    const qu = q.trim().toUpperCase();
    const isAccession = /^[A-NR-Z][0-9][A-Z][A-Z0-9]{2}[0-9]([A-Z][A-Z0-9]{2}[0-9])?$|^[OPQ][0-9][A-Z0-9]{3}[0-9]([A-Z][A-Z0-9]{2}[0-9])?$/.test(qu);
    const isPdb = /^[0-9][A-Z0-9]{3}$/.test(qu);
    const isLikelyName = !isAccession && !isPdb && q.length > 2;
    if (isLikelyName) {
      const candidates = await fetchCandidates(q);
      if (candidates.length > 1) {
        document.getElementById('loading').classList.remove('active');
        document.getElementById('searchBtn').disabled = false;
        showPicker(candidates);
        return;
      }
      if (candidates.length === 1) {
        await loadAccession(candidates[0].acc);
        return;
      }
      // No candidates found — fall through to resolve() which will error properly
    }
    const acc = await resolve(q);
    setLoading('Fetching UniProt data...');
    const uni = await fetchUni(acc);
    const taxon = uni.organism?.taxonId || 9606;
    const gene = uni.genes?.[0]?.geneName?.value || acc;
    setLoading('Fetching STRING interactions...');
    const str = await fetchStr(gene, taxon);
    setLoading('Fetching InterPro domains...');
    const ipr = await fetchIpr(acc);
    setLoading('Fetching Reactome pathways...');
    const react = await fetchReact(acc);
    setLoading('Fetching PDB structures...');
    const pdbEntries = await fetchPdbEntries(acc);
    setLoading('Fetching references & structure classifications...');
    const funcText = uni.comments?.find(c => c.commentType === 'FUNCTION')?.texts?.[0]?.value || '';
    const pmids = extractPmids(funcText);
    const [pmMeta, structClass] = await Promise.all([
      fetchPubMed(pmids),
      fetchStructClass(pdbEntries.map(p => p.id))
    ]);
    document.getElementById('loading').classList.remove('active');
    render(uni, str, ipr, react, gene, pdbEntries, pmMeta, structClass);
  } catch(e) {
    showError(e.message);
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}


// ── Disambiguation ───────────────────────────────────────────────────────────

async function fetchCandidates(q) {
  const fields = 'accession,protein_name,gene_names,organism_name,reviewed';
  const results = [];
  const seen = new Set();

  const add = (entries) => {
    for (const e of (entries || [])) {
      const acc = e.primaryAccession;
      if (!acc || seen.has(acc)) continue;
      seen.add(acc);
      const name = e.proteinDescription?.recommendedName?.fullName?.value
        || e.proteinDescription?.submittedName?.[0]?.fullName?.value || acc;
      const gene = e.genes?.[0]?.geneName?.value || '';
      const org = e.organism?.scientificName || '';
      const reviewed = e.entryType?.includes('Swiss-Prot') || e.entryType?.includes('reviewed');
      results.push({ acc, name, gene, org, reviewed });
    }
  };

  // Protein name search, reviewed first
  try {
    const r = await fetch(`${UNI}/search?query=protein_name:${encodeURIComponent(q)}+AND+reviewed:true&format=json&size=8&fields=${fields}`);
    if (r.ok) add((await r.json()).results);
  } catch(e) {}

  // Full-text search, reviewed
  if (results.length < 4) {
    try {
      const r = await fetch(`${UNI}/search?query=${encodeURIComponent(q)}+AND+reviewed:true&format=json&size=8&fields=${fields}`);
      if (r.ok) add((await r.json()).results);
    } catch(e) {}
  }

  // Fallback: unreviewed
  if (!results.length) {
    try {
      const r = await fetch(`${UNI}/search?query=${encodeURIComponent(q)}&format=json&size=6&fields=${fields}`);
      if (r.ok) add((await r.json()).results);
    } catch(e) {}
  }

  results.sort((a, b) => (a.reviewed === b.reviewed ? 0 : a.reviewed ? -1 : 1));
  return results.slice(0, 8);
}

async function resolve(q) {
  const qu = q.trim().toUpperCase();

  // 1. Direct UniProt accession pattern (e.g. P04637, Q6L8H1)
  if (/^[A-NR-Z][0-9][A-Z][A-Z0-9]{2}[0-9]([A-Z][A-Z0-9]{2}[0-9])?$|^[OPQ][0-9][A-Z0-9]{3}[0-9]([A-Z][A-Z0-9]{2}[0-9])?$/.test(qu)) {
    try {
      const r = await fetch(`${UNI}/${encodeURIComponent(qu)}?format=json&fields=accession`);
      if (r.ok) { const d = await r.json(); if (d.primaryAccession) return d.primaryAccession; }
    } catch(e) {}
  }

  // 2. PDB code (4 chars: digit + 3 alphanumeric, e.g. 1TUP)
  if (/^[0-9][A-Z0-9]{3}$/.test(qu)) {
    try {
      const r = await fetch(`${UNI}/search?query=database:(type:pdb id:${encodeURIComponent(qu)})&format=json&size=1&fields=accession`);
      if (r.ok) { const d = await r.json(); if (d.results && d.results.length) return d.results[0].primaryAccession; }
    } catch(e) {}
  }

  // 3. Gene name: exact match, human reviewed (most precise)
  try {
    const r = await fetch(`${UNI}/search?query=gene_exact:${encodeURIComponent(qu)}+AND+organism_id:9606+AND+reviewed:true&format=json&size=1&fields=accession`);
    if (r.ok) { const d = await r.json(); if (d.results && d.results.length) return d.results[0].primaryAccession; }
  } catch(e) {}

  // 4. Gene name: exact match, any reviewed (catches non-human)
  try {
    const r = await fetch(`${UNI}/search?query=gene_exact:${encodeURIComponent(qu)}+AND+reviewed:true&format=json&size=1&fields=accession`);
    if (r.ok) { const d = await r.json(); if (d.results && d.results.length) return d.results[0].primaryAccession; }
  } catch(e) {}

  // 5. Gene name: exact match, unreviewed
  try {
    const r = await fetch(`${UNI}/search?query=gene_exact:${encodeURIComponent(qu)}&format=json&size=1&fields=accession`);
    if (r.ok) { const d = await r.json(); if (d.results && d.results.length) return d.results[0].primaryAccession; }
  } catch(e) {}

  // 6. Broad gene search fallback (handles aliases, partial matches)
  try {
    const r = await fetch(`${UNI}/search?query=gene:${encodeURIComponent(qu)}+AND+organism_id:9606+AND+reviewed:true&format=json&size=1&fields=accession`);
    if (r.ok) { const d = await r.json(); if (d.results && d.results.length) return d.results[0].primaryAccession; }
  } catch(e) {}

  // 7. Last resort: full-text search
  const r = await fetch(`${UNI}/search?query=${encodeURIComponent(qu)}&format=json&size=1&fields=accession`);
  if (!r.ok) throw new Error('UniProt search failed');
  const d = await r.json();
  if (!d.results || !d.results.length) throw new Error('No entry found for "' + q + '"');
  return d.results[0].primaryAccession;
}

async function fetchUni(acc) {
  const fields = 'accession,id,protein_name,gene_names,organism_name,sequence,cc_function,cc_subcellular_location,cc_disease,keyword,xref_pdb,reviewed,length,mass';
  const r = await fetch(`${UNI}/${acc}?format=json&fields=${fields}`);
  if (!r.ok) throw new Error(`UniProt fetch failed for ${acc}`);
  return r.json();
}

async function fetchStr(gene, taxon) {
  try {
    // Fetch interactions for the target protein (hub + all direct partners)
    const r = await fetch(`${STR}/network?identifiers=${encodeURIComponent(gene)}&species=${taxon}&limit=20&required_score=400&caller_identity=proteinscope`);
    if (!r.ok) return [];
    const data = await r.json();
    if (!data || !data.length) return [];

    // Collect all unique genes in the network
    const allGenes = new Set([gene]);
    data.forEach(e => { allGenes.add(e.preferredName_A); allGenes.add(e.preferredName_B); });
    const partners = [...allGenes].filter(g => g !== gene).slice(0, 18);

    // Now fetch inter-partner interactions by sending all identifiers at once
    let interPartnerEdges = [];
    if (partners.length >= 2) {
      try {
        const allIds = [gene, ...partners].join('%0d');
        const r2 = await fetch(`${STR}/network?identifiers=${allIds}&species=${taxon}&required_score=400&caller_identity=proteinscope`);
        if (r2.ok) interPartnerEdges = await r2.json() || [];
      } catch(e) {}
    }

    return { hubEdges: data, partnerEdges: interPartnerEdges, gene };
  } catch { return []; }
}

async function fetchIpr(acc) {
  try {
    const r = await fetch(`${IPR}/entry/all/protein/UniProt/${acc}/?page_size=30&format=json`);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

async function fetchReact(acc) {
  try {
    const r = await fetch(`https://reactome.org/ContentService/data/mapping/UniProt/${acc}/pathways?species=9606`);
    return r.ok ? r.json() : [];
  } catch { return []; }
}

async function fetchPdbEntries(acc) {
  try {
    const r = await fetch(`${UNI}/${acc}?format=json&fields=xref_pdb`);
    if (!r.ok) return [];
    const d = await r.json();
    const refs = (d.uniProtKBCrossReferences || []).filter(x => x.database === 'PDB');
    if (!refs.length) return [];
    // Fetch metadata for all IDs (up to 40) so we can filter/rank by quality
    const allIds = refs.slice(0, 40).map(x => x.id);
    try {
      const q = `{entries(entry_ids:${JSON.stringify(allIds)}){rcsb_id,struct{title},exptl{method},refine{ls_d_res_high},rcsb_entry_info{resolution_combined}}}`;
      const mr = await fetch(`https://data.rcsb.org/graphql?query=${encodeURIComponent(q)}`);
      if (mr.ok) {
        const md = await mr.json();
        const entries = (md?.data?.entries || []).map(e => {
          const method = (e.exptl?.[0]?.method || '');
          const methodLabel = method.replace('X-RAY DIFFRACTION','X-ray').replace('ELECTRON MICROSCOPY','cryo-EM').replace('SOLUTION NMR','NMR').replace('SOLID-STATE NMR','ssNMR');
          const resolution = e.refine?.[0]?.ls_d_res_high || e.rcsb_entry_info?.resolution_combined?.[0] || null;
          return { id: e.rcsb_id, title: e.struct?.title || '', method: methodLabel, methodRaw: method, resolution };
        });

        // Quality filter: keep X-ray ≤3.5Å, cryo-EM ≤4.0Å, NMR (no res filter), exclude unknowns
        const curated = entries.filter(e => {
          const m = e.methodRaw;
          const res = e.resolution ? parseFloat(e.resolution) : null;
          if (m === 'X-RAY DIFFRACTION') return res === null || res <= 3.5;
          if (m === 'ELECTRON MICROSCOPY') return res === null || res <= 4.0;
          if (m.includes('NMR')) return true;
          return false; // skip NEUTRON DIFFRACTION, FIBER DIFFRACTION, etc.
        });

        // Sort: X-ray best res first, then cryo-EM best res, then NMR
        const methodOrder = m => m === 'X-RAY DIFFRACTION' ? 0 : m === 'ELECTRON MICROSCOPY' ? 1 : 2;
        curated.sort((a, b) => {
          const mo = methodOrder(a.methodRaw) - methodOrder(b.methodRaw);
          if (mo !== 0) return mo;
          const ra = a.resolution ? parseFloat(a.resolution) : 99;
          const rb = b.resolution ? parseFloat(b.resolution) : 99;
          return ra - rb;
        });

        return curated.slice(0, 12);
      }
    } catch {}
    // Fallback: just return first 12 without filtering
    return allIds.slice(0, 12).map(id => ({ id, title: '', method: '', resolution: null }));
  } catch { return []; }
}

async function fetchPubMed(pmids) {
  if (!pmids.length) return {};
  try {
    const ids = pmids.slice(0, 20).join(',');
    const r = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids}&retmode=json`);
    if (!r.ok) return {};
    const d = await r.json();
    const result = {};
    pmids.forEach(id => {
      const art = d.result?.[id];
      if (!art) return;
      const authors = (art.authors || []).map(a => a.name);
      let authStr = '';
      if (authors.length === 1) authStr = authors[0];
      else if (authors.length === 2) authStr = authors[0] + ' and ' + authors[1];
      else if (authors.length >= 3) authStr = authors[0] + ' et al.';
      const year = art.pubdate ? art.pubdate.slice(0,4) : '';
      const journal = art.source || '';
      const vol = art.volume || '';
      const issue = art.issue ? '(' + art.issue + ')' : '';
      const pages = art.pages || '';
      const title = art.title || '';
      // IEEE format: Authors, "Title," Journal, vol. X, no. Y, pp. Z, Year.
      let cite = authStr;
      if (title) cite += ', "' + title.replace(/\.$/,'') + ',"';
      if (journal) cite += ' <em>' + journal + '</em>';
      if (vol) cite += ', vol. ' + vol;
      if (issue) cite += ', no. ' + art.issue;
      if (pages) cite += ', pp. ' + pages;
      if (year) cite += ', ' + year + '.';
      result[id] = { cite, pmid: id, title };
    });
    return result;
  } catch { return {}; }
}

async function fetchStructClass(pdbIds) {
  if (!pdbIds.length) return { cath: [], scop: [] };
  // Use the first 5 PDB IDs to keep it fast
  const sample = pdbIds.slice(0, 5);
  const cath = [], scop = [];
  const seen = { cath: new Set(), scop: new Set() };
  await Promise.all(sample.map(async pdbId => {
    try {
      // CATH via SIFTS summary API
      const r = await fetch(`https://www.ebi.ac.uk/pdbe/api/mappings/cath/${pdbId.toLowerCase()}`);
      if (r.ok) {
        const d = await r.json();
        const entry = d[pdbId.toLowerCase()];
        if (entry && entry.CATH) {
          Object.values(entry.CATH).forEach(dom => {
            const key = dom.domain || dom.cathId;
            if (!seen.cath.has(key)) {
              seen.cath.add(key);
              cath.push({ pdb: pdbId, id: dom.domain || '', cathId: dom.cathId || '', name: dom.name || '', class: dom.class || '', arch: dom.architecture || '', topo: dom.topology || '' });
            }
          });
        }
      }
    } catch {}
    try {
      // SCOP via SIFTS
      const r = await fetch(`https://www.ebi.ac.uk/pdbe/api/mappings/scop/${pdbId.toLowerCase()}`);
      if (r.ok) {
        const d = await r.json();
        const entry = d[pdbId.toLowerCase()];
        if (entry && entry.SCOP) {
          Object.values(entry.SCOP).forEach(dom => {
            const key = dom.scop_id || dom.fold?.description;
            if (key && !seen.scop.has(key)) {
              seen.scop.add(key);
              scop.push({ pdb: pdbId, id: dom.scop_id || '', fold: dom.fold?.description || '', superfam: dom.superfamily?.description || '', fam: dom.family?.description || '', cls: dom.class?.description || '' });
            }
          });
        }
      }
    } catch {}
  }));
  return { cath: cath.slice(0, 8), scop: scop.slice(0, 8) };
}

// ── Utilities ────────────────────────────────────────────────────────────────

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Parse PubMed IDs from UniProt function text like "(PubMed:12345678)"
function extractPmids(text) {
  const matches = text.match(/PubMed:(\d+)/g) || [];
  return [...new Set(matches.map(m => m.replace('PubMed:','')))] ;
}

// Strip (PubMed:XXXX) references from function text; return {html, refs[]}
function formatFuncText(text, pmMeta) {
  const ordered = extractPmids(text);
  const clean = text.replace(/\s*\(PubMed:[^)]+\)/g, '').replace(/\s+\./g, '.').trim();
  const html = esc(clean);
  return { html, ordered };
}

// ── Render ───────────────────────────────────────────────────────────────────

function render(uni, strData, iprData, reactData, mainGene, pdbEntries, pmMeta, structClass) {
  const acc = uni.primaryAccession;
  const name = uni.proteinDescription?.recommendedName?.fullName?.value || uni.proteinDescription?.submittedName?.[0]?.fullName?.value || acc;
  const gene = uni.genes?.[0]?.geneName?.value || '';
  const organism = uni.organism?.scientificName || '';
  const reviewed = uni.entryType?.includes('Swiss-Prot') || uni.entryType?.includes('reviewed');
  const length = uni.sequence?.length || 0;
  const mass = uni.sequence?.molWeight || 0;
  const seq = uni.sequence?.value || '';
  const funcText = uni.comments?.find(c => c.commentType === 'FUNCTION')?.texts?.[0]?.value || '';
  const locations = uni.comments?.find(c => c.commentType === 'SUBCELLULAR LOCATION')?.subcellularLocations?.map(l => l.location?.value).filter(Boolean) || [];
  const diseases = uni.comments?.filter(c => c.commentType === 'DISEASE') || [];
  const keywords = (uni.keywords||[]).map(k=>k.name).slice(0,6);
  const pdbCount = pdbEntries.length;

  // IEEE citations
  const { html: funcHtml, ordered: orderedPmids } = funcText
    ? formatFuncText(funcText, pmMeta || {})
    : { html: '', ordered: [] };

  const referencesHtml = orderedPmids.length ? `
    <div class="references-block">
      <div class="ref-title">References</div>
      ${orderedPmids.map((pmid, i) => {
        const m = (pmMeta || {})[pmid];
        const body = m ? m.cite : `PubMed:${pmid}`;
        return `<div class="ref-item">
          <span class="ref-num">[${i+1}]</span>
          <span class="ref-body">${body} <a href="https://pubmed.ncbi.nlm.nih.gov/${pmid}/" target="_blank">PMID:${pmid} ↗</a></span>
        </div>`;
      }).join('')}
    </div>` : '';

  let interactions = [];
  let allNetEdges = [];
  const strRaw = strData;
  if (strRaw && strRaw.hubEdges && strRaw.hubEdges.length) {
    const seen = new Set();
    [...strRaw.hubEdges].sort((a,b)=>(b.score||0)-(a.score||0)).forEach(s => {
      const partner = s.preferredName_B !== mainGene ? s.preferredName_B : s.preferredName_A;
      if (!seen.has(partner) && partner !== mainGene) { seen.add(partner); interactions.push({ gene: partner, score: s.score }); }
    });
    interactions = interactions.slice(0,18);
    allNetEdges = strRaw.partnerEdges || [];
  } else if (Array.isArray(strRaw) && strRaw.length) {
    // fallback: old flat array format
    const seen = new Set();
    [...strRaw].sort((a,b)=>(b.score||0)-(a.score||0)).forEach(s => {
      const partner = s.preferredName_B !== mainGene ? s.preferredName_B : s.preferredName_A;
      if (!seen.has(partner) && partner !== mainGene) { seen.add(partner); interactions.push({ gene: partner, score: s.score }); }
    });
    interactions = interactions.slice(0,18);
  }

  const iprEntries = iprData?.results || [];
  const pathways = (reactData||[]).slice(0,16);
  const typeColors = {
    'family': 'color:#10b981;border-color:rgba(16,185,129,0.4)',
    'domain': 'color:#00d4ff;border-color:rgba(0,212,255,0.4)',
    'homologous_superfamily': 'color:#a78bfa;border-color:rgba(167,139,250,0.4)',
    'repeat': 'color:#f59e0b;border-color:rgba(245,158,11,0.4)',
    'site': 'color:#f87171;border-color:rgba(248,113,113,0.4)',
  };

  // Store globally for download callbacks
  window._ps = { seq, acc, gene: gene || acc, name, organism };

  const pdbSidebarHTML = pdbEntries.length
    ? pdbEntries.map((p, i) => {
        const resStr = p.resolution ? `${parseFloat(p.resolution).toFixed(1)}Å` : '';
        const meta = [p.method, resStr].filter(Boolean).join(' · ');
        return `<div class="pdb-entry" id="pdb-entry-${i}" onclick="loadPdb('${esc(p.id)}',${i})">
          <div style="flex:1;min-width:0">
            <div class="pdb-id">${esc(p.id)}</div>
            ${meta ? `<div class="pdb-meta">${esc(meta)}</div>` : ''}
          </div>
          <button class="pdb-dl-btn" onclick="event.stopPropagation();downloadPdb('${esc(p.id)}')">↓ PDB</button>
        </div>`;
      }).join('')
    : `<div style="padding:20px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">No structures available</div>`;

  document.getElementById('results').innerHTML = `
    <div class="protein-hero anim">
      <div class="protein-hero-top">
        <div class="accession-block">
          <div class="accession-id">${esc(acc)}</div>
          <div class="accession-label">UniProt Accession</div>
          <div class="ext-links">
            <a class="ext-link" href="https://www.uniprot.org/uniprotkb/${acc}" target="_blank">UniProt ↗</a>

window._nglStage = null;

// Chain color palette matching NGL's default chainid scheme
const CHAIN_COLORS = [
  { label:'Chain A', color:'#4e79a7' }, { label:'Chain B', color:'#f28e2b' },
  { label:'Chain C', color:'#e15759' }, { label:'Chain D', color:'#76b7b2' },
  { label:'Chain E', color:'#59a14f' }, { label:'Chain F', color:'#edc948' },
  { label:'Chain G', color:'#b07aa1' }, { label:'Chain H', color:'#ff9da7' },
];

function buildStructureLegend(comp, repr) {
  const existing = document.getElementById('_nglLegend');
  if (existing) existing.remove();
  const viewport = document.getElementById('nglViewport');
  if (!viewport) return;

  const legend = document.createElement('div');
  legend.id = '_nglLegend';
  legend.style.cssText = 'position:absolute;bottom:10px;left:10px;background:rgba(7,9,15,0.78);border:1px solid rgba(0,212,255,0.2);padding:8px 12px;font-family:"IBM Plex Mono",monospace;font-size:10px;color:#94a3b8;z-index:5;pointer-events:none;max-width:200px;';

  let chains = [];
  if (comp && comp.structure) {
    comp.structure.eachChain(c => { if (!chains.includes(c.chainname)) chains.push(c.chainname); });
  }

  let html = '';
  if (repr === 'surface') {
    html = '<div style="margin-bottom:4px;color:#00d4ff;font-size:9px;letter-spacing:1px">SURFACE · ELECTROSTATIC</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:40px;height:8px;background:linear-gradient(90deg,#0000ff,#ffffff,#ff0000);border-radius:2px"></div></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:9px"><span>– charge</span><span>neutral</span><span>+ charge</span></div>';
  } else {
    html = '<div style="margin-bottom:5px;color:#00d4ff;font-size:9px;letter-spacing:1px">CHAINS (by color)</div>';
    const visChains = chains.length ? chains.slice(0, 8) : ['A'];
    visChains.forEach((ch, i) => {
      const c = CHAIN_COLORS[i % CHAIN_COLORS.length];
      html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:12px;height:12px;border-radius:2px;background:${c.color};flex-shrink:0"></div><span>Chain ${ch}</span></div>`;
    });
    if (chains.length > 8) html += `<div style="color:#64748b;font-size:9px">+${chains.length-8} more chains</div>`;
  }
  legend.innerHTML = html;
  viewport.appendChild(legend);
}

async function loadPdb(pdbId, idx) {
  document.querySelectorAll('.pdb-entry').forEach(el => el.classList.remove('active'));
  const entry = document.getElementById('pdb-entry-' + idx);
  if (entry) entry.classList.add('active');

  const viewport = document.getElementById('nglViewport');
  if (!viewport) return;
  const placeholder = document.getElementById('nglPlaceholder');
  if (placeholder) placeholder.remove();
  const existingLegend = document.getElementById('_nglLegend');
  if (existingLegend) existingLegend.remove();

  // Loading overlay
  let ov = document.getElementById('_nglOv');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = '_nglOv';
    ov.className = 'ngl-loading';
    viewport.appendChild(ov);
  }
  ov.innerHTML = '<div class="mini-spin"></div><span>Loading ' + pdbId + '…</span>';
  ov.style.display = 'flex';

  if (!window._nglStage) {
    window._nglStage = new NGL.Stage('nglViewport', { backgroundColor: '#07090f', quality: 'medium' });
    window.addEventListener('resize', () => { if (window._nglStage) window._nglStage.handleResize(); });
  } else {
    window._nglStage.removeAllComponents();
    window._nglComp = null;
  }

  // Try multiple sources in order of reliability
  const sources = [
    'https://files.rcsb.org/download/' + pdbId + '.cif',
    'https://files.rcsb.org/download/' + pdbId + '.pdb',
    'rcsb://' + pdbId,
  ];

  let comp = null;
  for (const src of sources) {
    try {
      comp = await window._nglStage.loadFile(src, { defaultRepresentation: false });
      if (comp) break;
    } catch(e) { /* try next */ }
  }

  if (comp) {
    window._nglComp = comp;
    applyRepr(comp, window._nglRepr);
    window._nglStage.autoView();
    ov.style.display = 'none';
    buildStructureLegend(comp, window._nglRepr);
  } else {
    ov.innerHTML = '<span style="color:var(--danger)">Failed to load ' + pdbId + ' — try another entry</span>';
    setTimeout(() => { ov.style.display = 'none'; }, 3000);
  }
}

function applyRepr(comp, repr) {
  comp.removeAllRepresentations();
  const opts = {};
  if (repr === 'surface') {
    opts.colorScheme = 'electrostatic';
    opts.opacity = 0.82;
  } else {
    opts.colorScheme = 'chainid';
    opts.colorScale = ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7'];
  }
  comp.addRepresentation(repr, opts);
}

function setRepr(repr) {
  window._nglRepr = repr;
  document.querySelectorAll('.struct-btn[id^="repr-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('repr-' + repr);
  if (btn) btn.classList.add('active');
  if (window._nglComp) {
    applyRepr(window._nglComp, repr);
    buildStructureLegend(window._nglComp, repr);
  }
}

// ── Downloads ─────────────────────────────────────────────────────────────────

async function downloadPdb(pdbId) {
  const url = `https://files.rcsb.org/download/${pdbId}.pdb`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error();
    const text = await r.text();
    triggerDownload(text, `${pdbId}.pdb`, 'chemical/x-pdb');
  } catch { window.open(url, '_blank'); }
}

function downloadFasta() {
  const p = window._ps;
  if (!p || !p.seq) return;
  const header = `>${p.acc}|${p.gene}|${p.name} [${p.organism}]`;
  const body = p.seq.match(/.{1,70}/g).join('\n');
  triggerDownload(header + '\n' + body + '\n', `${p.acc}_${p.gene}.fasta`, 'text/plain');
}

function triggerDownload(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Sequence ─────────────────────────────────────────────────────────────────

function fmtSeq(seq) {
  const lines = [];
  for (let i = 0; i < seq.length; i += 60) {
    const chunk = seq.slice(i, i+60);
    lines.push((String(i+1)).padStart(6) + '  ' + chunk.match(/.{1,10}/g).join(' '));
  }
  return esc(lines.join('\n'));
}

// ── STRING Network ───────────────────────────────────────────────────────────

const STRING_PALETTE = [
  {fill:'#c8e6c9',stroke:'#66bb6a'},{fill:'#b3e0f2',stroke:'#29b6f6'},
  {fill:'#e8d5b0',stroke:'#c8a96a'},{fill:'#d1c4e9',stroke:'#9575cd'},
  {fill:'#f8bbd0',stroke:'#ec407a'},{fill:'#c5e3d8',stroke:'#26a69a'},
  {fill:'#fff9c4',stroke:'#f9a825'},{fill:'#bbdefb',stroke:'#42a5f5'},
  {fill:'#ffe0b2',stroke:'#ffa726'},{fill:'#f0f4c3',stroke:'#c0ca33'},
  {fill:'#e1bee7',stroke:'#ab47bc'},{fill:'#b2dfdb',stroke:'#26a69a'},
];
const EDGE_CHANNELS = ['#00cc00','#ff7f00','#ff0000','#0000ff','#00ccff','#ff00ff','#ffff00'];

function buildNet(center, interactions, allEdges) {
  const wrap = document.getElementById('netWrap');
  const svgEl = document.getElementById('netSvg');
  if (!svgEl || !wrap) return;
  const W = wrap.clientWidth || 800, H = 500;
  svgEl.setAttribute('width', W); svgEl.setAttribute('height', H);
  const svg = d3.select('#netSvg');
  svg.selectAll('*').remove();
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#f0ede8');

  if (!interactions.length) {
    svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#888').attr('font-family','Arial').attr('font-size',13).text('No STRING data — try searching by gene symbol (e.g. TP53)');
    return;
  }

  const partnerSet = new Set(interactions.map(d => d.gene));
  const scoreMap = {};
  interactions.forEach(d => { scoreMap[d.gene] = d.score; });

  const nodes = [
    { id: center, isCenter: true, score: 1, colorIdx: -1 },
    ...interactions.map((d, i) => ({ id: d.gene, isCenter: false, score: d.score, colorIdx: i % STRING_PALETTE.length }))
  ];

  // Build edges: hub→partner + partner→partner (from allEdges)
  const edgeKey = (a,b) => [a,b].sort().join('|');
  const seenEdges = new Set();
  const links = [];

  // Hub edges first
  interactions.forEach(d => {
    const k = edgeKey(center, d.gene);
    if (!seenEdges.has(k)) { seenEdges.add(k); links.push({ source: center, target: d.gene, score: d.score, isHub: true }); }
  });

  // Inter-partner edges from full network query
  if (allEdges && allEdges.length) {
    allEdges.forEach(e => {
      const a = e.preferredName_A, b = e.preferredName_B;
      if (!a || !b || a === b) return;
      if (a === center || b === center) return; // already covered by hub edges
      if (!partnerSet.has(a) || !partnerSet.has(b)) return;
      const k = edgeKey(a, b);
      if (!seenEdges.has(k)) {
        seenEdges.add(k);
        links.push({ source: a, target: b, score: e.score || 0.4, isHub: false });
      }
    });
  }

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.2,6]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  document.getElementById('zIn').onclick = ()=>svg.transition().duration(300).call(zoom.scaleBy,1.4);
  document.getElementById('zOut').onclick = ()=>svg.transition().duration(300).call(zoom.scaleBy,0.7);
  document.getElementById('zReset').onclick = ()=>svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity);

  const nodeR = d => d.isCenter ? 28 : Math.max(14, 10 + d.score * 12);
  const chCount = s => s>=0.9?5:s>=0.7?4:s>=0.5?3:s>=0.3?2:1;

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id)
      .distance(d => d.isHub ? (90 + (1-d.score)*60) : (60 + (1-d.score)*40))
      .strength(d => d.isHub ? 0.7 : 0.4))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide().radius(d=>nodeR(d)+18));

  const lg = g.append('g');
  const linkLines = [];
  links.forEach(lk => {
    const ch = chCount(lk.score);
    for (let ci=0; ci<ch; ci++) {
      const color = lk.isHub ? EDGE_CHANNELS[ci % EDGE_CHANNELS.length] : '#999';
      const opacity = lk.isHub ? 0.75 : 0.45;
      const width = lk.isHub ? 1.6 : 1.1;
      linkLines.push({
        line: lg.append('line').attr('stroke', color).attr('stroke-width', width).attr('stroke-opacity', opacity)
          .attr('stroke-dasharray', lk.isHub ? 'none' : (lk.score < 0.5 ? '4,3' : 'none')),
        lk, ci, ch
      });
    }
  });

  const drag = d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;});

  const node = g.append('g').selectAll('g').data(nodes).join('g').style('cursor',d=>d.isCenter?'default':'pointer').call(drag);
  node.append('circle').attr('r',nodeR)
    .attr('fill',d=>d.isCenter?'#f4b8b0':STRING_PALETTE[d.colorIdx].fill)
    .attr('stroke',d=>d.isCenter?'#e07060':STRING_PALETTE[d.colorIdx].stroke)
    .attr('stroke-width',d=>d.isCenter?2.5:1.8)
    .on('mouseover',function(e,d){if(!d.isCenter)d3.select(this).attr('stroke-width',3.5);})
    .on('mouseout',function(e,d){d3.select(this).attr('stroke-width',d.isCenter?2.5:1.8);});
  node.filter(d=>d.isCenter).append('text').text('⬡').attr('text-anchor','middle').attr('dy','0.35em').attr('font-size',20).attr('fill','rgba(180,80,60,0.5)').style('pointer-events','none');
  node.append('text').text(d=>d.id).attr('text-anchor','middle').attr('dy',d=>-(nodeR(d)+7)).attr('fill','#222').attr('font-family','Arial,Helvetica,sans-serif').attr('font-size',d=>d.isCenter?13:11).attr('font-weight',d=>d.isCenter?700:400).style('pointer-events','none').style('text-shadow','0 0 3px #f0ede8,0 0 3px #f0ede8');

  // Score badge on each node
  node.filter(d=>!d.isCenter).append('text').text(d=>(d.score*1000).toFixed(0)).attr('text-anchor','middle').attr('dy','0.35em').attr('fill','#555').attr('font-family','Arial').attr('font-size',8).style('pointer-events','none');

  const tip = document.getElementById('netTip');
  node.on('mouseover.tip',(e,d)=>{
    const sc = d.isCenter?'Query protein':`Combined score: ${(d.score*1000).toFixed(0)}`;
    tip.innerHTML=`<strong>${d.id}</strong><div class="tip-score">${sc}</div>${d.isCenter?'':`<div class="tip-action">Click to search in STRING ↗</div>`}`;
    tip.style.opacity=1;
  }).on('mousemove.tip',e=>{
    const rect=wrap.getBoundingClientRect();
    let x=e.clientX-rect.left+14,y=e.clientY-rect.top-10;
    if(x+180>W)x-=195;
    tip.style.left=x+'px';tip.style.top=y+'px';
  }).on('mouseout.tip',()=>{tip.style.opacity=0;});
  node.filter(d=>!d.isCenter).on('click',(e,d)=>{e.stopPropagation();window.open(`https://string-db.org/cgi/network?identifiers=${encodeURIComponent(d.id)}&species=9606`,'_blank');});

  sim.on('tick',()=>{
    linkLines.forEach(({line,lk,ci,ch})=>{
      const src=typeof lk.source==='object'?lk.source:nodes.find(n=>n.id===lk.source);
      const tgt=typeof lk.target==='object'?lk.target:nodes.find(n=>n.id===lk.target);
      if(!src||!tgt)return;
      const dx=tgt.x-src.x,dy=tgt.y-src.y,len=Math.sqrt(dx*dx+dy*dy)||1;
      const px=-dy/len,py=dx/len,offset=(ci-(ch-1)/2)*2.8;
      line.attr('x1',src.x+px*offset).attr('y1',src.y+py*offset).attr('x2',tgt.x+px*offset).attr('y2',tgt.y+py*offset);
    });
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
}
</script>
</body>
</html>
